; ============================================================
;  PlatformIO Konfiguration – Indoor Navigation Beacon
;  Board: Seeed Studio XIAO ESP32 C6
; ============================================================
;
;  Beacon-spezifische Werte hier setzen (pro Beacon ändern!).
;  Alle anderen Einstellungen → include/config.h
;

[env:xiao_esp32c6]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = seeed_xiao_esp32c6
framework = arduino
monitor_speed = 115200

; BLE ist in Arduino-ESP32 v3.x eingebaut (NimBLE-basiert)
lib_deps =

; ============================================================
;  PRO BEACON ANPASSEN:
; ============================================================
build_flags =
    -D BEACON_ID=1           ; Beacon-Nummer (1, 2, 3, ...)
    -D TX_POWER_CALIBRATED=-59  ; Kalibrierter RSSI bei 1m (messen!)
    -D ADV_INTERVAL_MS=1000     ; Advertisement-Intervall in ms

; ============================================================
;  Weitere Beacons: Environment pro Beacon erstellen
;  (optional, alternativ einfach BEACON_ID oben ändern)
; ============================================================

; [env:beacon_2]
; extends = env:xiao_esp32c6
; build_flags =
;     -D BEACON_ID=1
;     -D TX_POWER_CALIBRATED=-61
